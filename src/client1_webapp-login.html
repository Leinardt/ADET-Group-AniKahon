<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AniKahon Login</title>

<style>
header{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    display: flex;
    height: 100vh;
}


.left {
    width: 55%;
    background: url('jewelry.webp') no-repeat center; 
    background-size: cover;
}


.right {
    width: 45%;
    background: #f5f5f5;
    display: flex;
    flex-direction: column;
}

.header {
    background: #A07855;
    color: white;
    padding: 20px;
    font-size: 22px;
    font-weight: bold;

}

.form-container {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
}

.form-box {
    width: 300px;
}

.form-box h2 {
    margin-bottom: 5px;
}

.form-box p {
    color: gray;
    font-size: 14px;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;
    border: none;
    border-bottom: 1px solid #ccc;
    background: transparent;
}

input:focus {
    outline: none;
    border-bottom: 1px solid #000;
}

button {
    width: 100%;
    padding: 10px;
    border: none;
    margin-bottom: 10px;
    cursor: pointer;
}

.login-btn {
    background:#e8c6c6;
}

.alert {
    margin-bottom: 10px;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="left"></div>

<div class="right">

    <div class="header">👜 AniKahon</div>

    <div class="form-container">
        <div class="form-box">

            <h2>Login to AniKahon</h2>
            <p>Enter your details below</p>

            <div id="alert"></div>

            <form id="login-form">
                <input type="text" id="username" placeholder="Username" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit" class="login-btn" id="login-btn">Login</button>

            </form>

        </div>
    </div>

</div>

<script>
const form = document.getElementById('login-form');
const alertBox = document.getElementById('alert');
const loginBtn = document.getElementById('login-btn');

function showMessage(msg, color = "red") {
    alertBox.style.color = color;
    alertBox.textContent = msg;
}

form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    if (!username || !password) {
        showMessage("Enter username and password");
        return;
    }

    loginBtn.disabled = true;
    loginBtn.textContent = "Logging in...";

    try {
        const response = await fetch('http://localhost/direct-login.php', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (data.status === 'SUCCESS') {
            showMessage(`Welcome, ${data.data.name}!`, "green");
            // Redirect based on role
            if (data.data.role === 'admin') {
                window.location.href = 'admin-dashboard.html';
            } else {
                window.location.href = 'dashboard.html';
            }
        } else {
            showMessage(data.message || "Login failed");
        }

    } catch (error) {
        console.error(error);
        showMessage("Failed to connect to server");
    }

    loginBtn.disabled = false;
    loginBtn.textContent = "Login";
});
</script>

</body>
</html>
