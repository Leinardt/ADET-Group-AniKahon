<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AniKahon</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #F5EFE6 0%, #E8DCC8 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        /* The back design */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 80%;
            height: 80%;
            background: radial-gradient(circle, rgba(160,120,85,0.1) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        body::after {
            content: '🧿';
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 120px;
            opacity: 0.05;
            pointer-events: none;
        }

        /* Main Auth Card yurr */
        .auth-card {
            background: white;
            border-radius: 24px;
            width: 480px;
            max-width: 90%;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15), 0 0 0 1px rgba(160, 120, 85, 0.1);
            animation: fadeInUp 0.6s ease-out;
            position: relative;
            z-index: 1;
        }

        .auth-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        /* Header */
        .auth-header {
            background: linear-gradient(135deg, #A07855 0%, #7A5C3E 100%);
            color: white;
            padding: 28px 24px;
            text-align: center;
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .auth-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .auth-card:hover .auth-header::before {
            left: 100%;
        }

        /* Form Container */
        .auth-form {
            padding: 40px 32px;
        }

        .auth-form h2 {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            font-weight: 700;
            color: #2C2C2C;
            margin-bottom: 8px;
        }

        .auth-form p {
            color: #666;
            font-size: 14px;
            margin-bottom: 28px;
        }

        /* Form Groups */
        .form-group {
            margin-bottom: 24px;
            position: relative;
        }

        /* Input Fields */
        .auth-input {
            width: 100%;
            border: 2px solid #E0D3C2;
            border-radius: 12px;
            padding: 14px 16px;
            font-size: 14px;
            font-family: 'Nunito', sans-serif;
            outline: none;
            background: white;
            transition: all 0.3s ease;
        }

        .auth-input:focus {
            border-color: #A07855;
            box-shadow: 0 0 0 3px rgba(160, 120, 85, 0.1);
        }

        .auth-input:hover:not(:focus) {
            border-color: #C4A07A;
        }

        /* Password Toggle */
        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 18px;
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        .toggle-password:hover {
            opacity: 1;
        }

        /* Options Row */
        .auth-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            font-size: 13px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: #666;
        }

        .remember-me:hover {
            color: #A07855;
        }

        .remember-me input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #A07855;
        }

        .forgot-link {
            color: #E8A0A0;
            text-decoration: none;
            transition: color 0.2s;
        }

        .forgot-link:hover {
            color: #d08080;
            text-decoration: underline;
        }

        /* Buttons */
        .btn-login {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            background: linear-gradient(135deg, #9BC08A 0%, #6A9A5A 100%);
            color: white;
            transition: all 0.3s ease;
            margin-bottom: 16px;
            font-family: 'Nunito', sans-serif;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(107, 154, 90, 0.3);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-signup {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            background: #F2C4C4;
            color: #7A5C3E;
            transition: all 0.3s ease;
            font-family: 'Nunito', sans-serif;
        }

        .btn-signup:hover {
            background: #E8A0A0;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(232, 160, 160, 0.3);
        }

        .btn-signup:active {
            transform: translateY(0);
        }

        /* Divider */
        .auth-divider {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin: 20px 0;
            position: relative;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: calc(50% - 30px);
            height: 1px;
            background: #E0D3C2;
        }

        .auth-divider::before {
            left: 0;
        }

        .auth-divider::after {
            right: 0;
        }

        /* Alert Messages */
        .alert {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 13px;
            animation: slideIn 0.3s ease-out;
        }

        .alert-error, .alert-danger {
            background: #fee;
            border-left: 4px solid #ff4444;
            color: #cc0000;
        }

        .alert-success {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
            color: #2e7d32;
        }

        .alert-warning {
            background: #fff3e0;
            border-left: 4px solid #ff9800;
            color: #e65100;
        }

        .alert-info {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            color: #0d47a1;
        }

        /* Loading State */
        .btn-login.loading {
            position: relative;
            color: transparent;
        }

        .btn-login.loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            top: 50%;
            left: 50%;
            margin-left: -10px;
            margin-top: -10px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 640px) {
            .auth-card {
                width: 95%;
            }
            
            .auth-header {
                font-size: 22px;
                padding: 20px;
            }
            
            .auth-form {
                padding: 28px 20px;
            }
            
            .auth-form h2 {
                font-size: 22px;
            }
        }

        @media (max-width: 480px) {
            .auth-options {
                flex-direction: column;
                gap: 12px;
                align-items: flex-start;
            }
            
            .auth-form {
                padding: 24px 16px;
            }
            
            .auth-input {
                padding: 12px 14px;
            }
            
            .btn-login, .btn-signup {
                padding: 12px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-header">
            🧿 AniKahon
        </div>
        <div class="auth-form">
            <h2>Welcome Back!</h2>
            <p>Login to continue shopping</p>
            
            <!-- Alert Messages Container -->
            <div id="alert-messages"></div>
            
            <!-- Login Form -->
            <form id="login-form">
                <div class="form-group">
                    <input type="text" name="username" id="username" class="auth-input" placeholder="Username or Email" required autofocus>
                </div>
                
                <div class="form-group">
                    <input type="password" name="password" id="password" class="auth-input" placeholder="Password" required>
                    <span class="toggle-password" onclick="togglePassword()">👁️</span>
                </div>
                
                <div class="auth-options">
                    <label class="remember-me">
                        <input type="checkbox" name="remember" id="remember"> Remember Me
                    </label>
                    <a href="#" class="forgot-link" onclick="alert('Password reset feature coming soon!')">Forgot Password?</a>
                </div>
                
                <button type="submit" class="btn-login" id="login-btn">Login</button>
                
                <div class="auth-divider">or</div>
                
                <button type="button" class="btn-signup" onclick="window.location.href='/register/'">Create New Account</button>
            </form>
        </div>
    </div>

    <script>
        // Toggle password visibility
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.querySelector('.toggle-password');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.textContent = '👁️‍🗨️';
            } else {
                passwordInput.type = 'password';
                toggleIcon.textContent = '👁️';
            }
        }

        // Show message function
        function showMessage(message, type = 'error') {
            const alertContainer = document.getElementById('alert-messages');
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.innerHTML = message;
            alertContainer.appendChild(alertDiv);
            
            // Auto remove after 5 seconds because you snooze u lose
            setTimeout(() => {
                alertDiv.remove();
            }, 5000);
        }

        // Clear all messages
        function clearMessages() {
            const alertContainer = document.getElementById('alert-messages');
            alertContainer.innerHTML = '';
        }

        // Set loading state
        function setLoading(isLoading) {
            const loginBtn = document.getElementById('login-btn');
            if (isLoading) {
                loginBtn.classList.add('loading');
                loginBtn.disabled = true;
            } else {
                loginBtn.classList.remove('loading');
                loginBtn.disabled = false;
            }
        }

        // Handle form submission
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Clear previous messages
            clearMessages();
            
            // Get form values
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            
            // Basic validation
            if (!username || !password) {
                showMessage('Please enter both username and password');
                return;
            }
            
            // Show loading state
            setLoading(true);
            
    
                try {
                    const response = await fetch('http://localhost/service.php', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            username: username,
                            password: password,
                            remember: remember
                        })
                    });
                    
                    const data = await response.json();
                    
                    if (response.ok) {
                        showMessage('Login successful! Redirecting...', 'success');
                        setTimeout(() => {
                            window.location.href = '/';
                        }, 1500);
                    } else {
                        showMessage(data.message || 'Login failed. Please check your credentials.');
                        setLoading(false);
                    }
                } catch (error) {
                    showMessage('Network error. Please try again.');
                    setLoading(false);
                }
        });
    </script>
</body>
</html>
