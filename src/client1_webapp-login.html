<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AniKahon Login</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    display: flex;
    height: 100vh;
}

.left {
    width: 55%;
    background: url('jewelry.webp') no-repeat center;
    background-size: cover;
}

.right {
    width: 45%;
    background: #f5f5f5;
    display: flex;
    flex-direction: column;
}

.header {
    background: #A07855;
    color: white;
    padding: 22px 30px;
    font-size: 35px;
    font-weight: 600;
    letter-spacing: 0.5px;
}

.form-container {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 0 80px;
}

.form-box {
    width: 80%;
}

.form-box h2 {
    font-size: 26px;
    font-weight: 600;
    margin-bottom: 8px;
    color: #222;
}

.form-box p {
    color: #999;
    font-size: 14px;
    font-weight: 300;
    margin-bottom: 36px;
}

input {
    width: 100%;
    padding: 14px 4px;
    margin-bottom: 24px;
    border: none;
    border-bottom: 1.5px solid #ccc;
    background: transparent;
    font-size: 15px;
    font-family: 'Poppins', sans-serif;
    color: #333;
    transition: border-color 0.2s;
}

input::placeholder {
    color: #bbb;
    font-weight: 300;
}

input:focus {
    outline: none;
    border-bottom: 1.5px solid #A07855;
}

button {
    width: 100%;
    padding: 14px;
    border: none;
    margin-bottom: 10px;
    cursor: pointer;
    font-family: 'Poppins', sans-serif;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.3px;
    border-radius: 4px;
    transition: opacity 0.2s;
}

button:hover {
    opacity: 0.85;
}

.login-btn {
    background: #beffc4;
    color: #5a2a2a;
}

#alert {
    margin-bottom: 16px;
    font-size: 13px;
    font-weight: 400;
    min-height: 18px;
}
</style>
</head>
<body>

<div class="left"></div>

<div class="right">
    <div class="header">👜 AniKahon</div>
    <div class="form-container">
        <div class="form-box">
            <h2>Login to AniKahon</h2>
            <p>Enter your details below</p>
            <div id="alert"></div>
            <form id="login-form">
                <input type="text" id="username" placeholder="Username" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit" class="login-btn" id="login-btn">Login</button>
            </form>
        </div>
    </div>
</div>

<script>
const form = document.getElementById('login-form');
const alertBox = document.getElementById('alert');
const loginBtn = document.getElementById('login-btn');

function showMessage(msg, color = "red") {
    alertBox.style.color = color;
    alertBox.textContent = msg;
}

form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    if (!username || !password) {
        showMessage("Enter username and password");
        return;
    }

    loginBtn.disabled = true;
    loginBtn.textContent = "Logging in...";

    try {
        const response = await fetch('http://localhost/direct-login.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (data.status === 'SUCCESS') {
            showMessage(`Welcome, ${data.data.name}!`, "green");
            if (data.data.role === 'admin') {
                window.location.href = 'admin-dashboard.html';
            } else {
                window.location.href = 'dashboard.html';
            }
        } else {
            showMessage(data.message || "Login failed");
        }

    } catch (error) {
        console.error(error);
        showMessage("Failed to connect to server");
    }

    loginBtn.disabled = false;
    loginBtn.textContent = "Login";
});
</script>

</body>
</html>
