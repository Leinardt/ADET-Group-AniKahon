<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AniKahon - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            padding: 40px;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo h1 {
            font-size: 32px;
            color: #333;
            letter-spacing: 2px;
        }
        
        .logo h1 span {
            color: #764ba2;
        }
        
        .logo p {
            color: #666;
            margin-top: 5px;
        }
        
        h2 {
            text-align: center;
            margin-bottom: 10px;
            color: #333;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        
        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e1e1;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #764ba2;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            display: none;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        
        .test-accounts {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e1e1e1;
        }
        
        .test-accounts h4 {
            margin-bottom: 10px;
            color: #666;
            font-size: 14px;
        }
        
        .test-accounts p {
            font-size: 12px;
            color: #888;
            margin-bottom: 5px;
        }
        
        .test-accounts strong {
            color: #764ba2;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>Ani<span>Kahon</span></h1>
            <p>Albay Accessories Shop</p>
        </div>
        
        <h2>Login</h2>
        <div class="subtitle">Enter your details below</div>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter your email or full name" required>
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>
            
            <button type="submit">Login</button>
        </form>
        
        <div id="message" class="message"></div>
        
        <div class="test-accounts">
            <h4>Test Accounts (for demo):</h4>
            <p><strong>Admin:</strong> admin@anikahon.com / password</p>
            <p><strong>User 1:</strong> john@example.com / password</p>
            <p><strong>User 2:</strong> jane@example.com / password</p>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost/ecommerce-api/api/direct-login.php';
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');
            
            // Clear previous message
            messageDiv.className = 'message';
            messageDiv.textContent = '';
            
            // Validate both fields are filled
            if (!username || !password) {
                messageDiv.textContent = 'Please enter both username and password';
                messageDiv.className = 'message error';
                return;
            }
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password
                    })
                });
                
                const data = await response.json();
                
                if (response.ok && data.status === 'success') {
                    messageDiv.textContent = `✅ ${data.message}. Welcome ${data.data.name}!`;
                    messageDiv.className = 'message success';
                    
                    // Optional: Store user info
                    localStorage.setItem('user', JSON.stringify(data.data));
                    
                    // Redirect or show dashboard after 2 seconds
                    setTimeout(() => {
                        alert(`Welcome to AniKahon, ${data.data.name}!`);
                        // window.location.href = '/dashboard.html';
                    }, 1000);
                } else {
                    messageDiv.textContent = data.message || 'Login failed. Please check your credentials.';
                    messageDiv.className = 'message error';
                }
            } catch (error) {
                messageDiv.textContent = 'Connection error. Make sure XAMPP is running.';
                messageDiv.className = 'message error';
                console.error('Error:', error);
            }
        });
    </script>
</body>
</html>
